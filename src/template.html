<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Battleship</title>
  
</head>
<body>
  <h1>Battleship</h1>
  <div id="status">Player's turn</div>
  <div class="boards-container">
    <div>
      <h2>Your Board</h2>
      <div id="player-board" class="board"></div>
    </div>
    <div>
      <h2>Enemy Board</h2>
      <div id="enemy-board" class="board"></div>
    </div>
  </div>
  <button id="random-placement">Randomize Ship Placement</button>
  <button id="start-game" disabled>Start Game</button>
 
</body>
</html>
